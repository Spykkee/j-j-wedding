<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J&J Wedding Outfit Cards — 10·10·2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="wrap">
    <h1 id="page-title">J&J Wedding Outfit Cards</h1>
    <div class="sub" id="page-sub">10 · 10 · 2026 &nbsp;·&nbsp; Provence Autumn Wedding Theme</div>

    <div class="lang-switch" id="lang-switch">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="fr">FR</button>
      <button class="lang-btn" data-lang="ko">한국어</button>
    </div>

    <div class="tabs-wrap">
      <div class="tabs-row">
        <div class="tabs-row-label" id="him-row-label">Gentleman</div>
        <div class="tabs" id="him-tabs">
          <button class="tab active" data-him="0"><span class="tab-swatch" style="background:#3A3A3A"></span><span class="tab-text">Dusty Elegance</span></button>
          <button class="tab" data-him="1"><span class="tab-swatch" style="background:#6B4C3B"></span><span class="tab-text">Romantic Classic</span></button>
          <button class="tab" data-him="2"><span class="tab-swatch" style="background:#1C2D4F"></span><span class="tab-text">Dark Luxe</span></button>
          <button class="tab" data-him="3"><span class="tab-swatch" style="background:#8FAF8A"></span><span class="tab-text">Sage Romance</span></button>
        </div>
      </div>
      <div class="tabs-row">
        <div class="tabs-row-label" id="her-row-label">Lady</div>
        <div class="tabs" id="her-tabs">
          <button class="tab active" data-her="0"><span class="tab-swatch" style="background:#C4898B"></span><span class="tab-text">Dusty Elegance</span></button>
          <button class="tab" data-her="1"><span class="tab-swatch" style="background:#C6A882"></span><span class="tab-text">Romantic Classic</span></button>
          <button class="tab" data-her="2"><span class="tab-swatch" style="background:#1C2B4A"></span><span class="tab-text">Dark Luxe</span></button>
          <button class="tab" data-her="3"><span class="tab-swatch" style="background:#722F37"></span><span class="tab-text">Sage Romance</span></button>
        </div>
      </div>
    </div>

    <div id="suits">
      <div class="outfit-wrap" id="suit-card"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
