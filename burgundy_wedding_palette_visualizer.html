
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:transparent}
  .wrap{font-family:'Jost',sans-serif;padding:1.5rem 0;max-width:700px;margin:0 auto}
  h1{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--color-text-primary);letter-spacing:.04em;margin-bottom:4px}
  .sub{font-size:12px;color:var(--color-text-secondary);letter-spacing:.12em;text-transform:uppercase;margin-bottom:1.5rem}
  .palette-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem}
  .swatch-card{border-radius:12px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .2s;position:relative}
  .swatch-card.active{border-color:var(--color-border-primary)}
  .swatch-top{height:90px;transition:height .2s}
  .swatch-info{padding:10px 12px;background:var(--color-background-primary);border-top:0.5px solid var(--color-border-tertiary)}
  .swatch-name{font-size:13px;font-weight:400;color:var(--color-text-primary);margin-bottom:2px}
  .swatch-hex{font-size:11px;color:var(--color-text-secondary);font-family:'Jost',monospace;letter-spacing:.05em}
  .role-tag{font-size:10px;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;margin-top:3px}
  .scene-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--color-text-secondary);margin:1.2rem 0 .6rem}
  .scene-card{background:var(--color-background-secondary);border-radius:12px;padding:1.2rem;border:0.5px solid var(--color-border-tertiary);margin-bottom:10px}
  .scene-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--color-text-primary);margin-bottom:1rem;font-style:italic}
  .table-strip{height:14px;border-radius:4px;margin-bottom:6px;display:flex;gap:4px;overflow:hidden}
  .strip-seg{flex:1;border-radius:2px}
  .floral{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
  .petal{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
  .petal-label{font-size:11px;color:var(--color-text-secondary)}
  .dress-row{display:flex;gap:10px;margin-top:.6rem;align-items:flex-end}
  .dress-swatch{width:44px;height:64px;border-radius:6px 6px 14px 14px;position:relative}
  .dress-dot{width:10px;height:10px;border-radius:50%;position:absolute;bottom:6px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.35)}
  .dress-label{font-size:10px;color:var(--color-text-secondary);text-align:center;margin-top:4px}
  .ratio-bar{height:22px;border-radius:6px;display:flex;overflow:hidden;margin-top:.8rem;gap:2px}
  .ratio-seg{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:400;transition:flex .4s ease;min-width:0;overflow:hidden;white-space:nowrap;padding:0 4px}
  .palette-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .mini-swatch{width:32px;height:32px;border-radius:6px}
  .tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
  .tab{padding:6px 14px;border-radius:20px;font-size:12px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);background:transparent;transition:all .15s;font-family:'Jost',sans-serif}
  .tab.active{background:var(--color-background-primary);color:var(--color-text-primary);border-color:var(--color-border-primary)}
  .combo-wrap{display:none}
  .combo-wrap.visible{display:block}
  .tip{font-size:12px;color:var(--color-text-secondary);line-height:1.6;margin-top:.8rem;font-style:italic}
</style>

<div class="wrap">
  <h1>Wedding Colour Palette</h1>
  <div class="sub">10 · 10 · 2026 &nbsp;·&nbsp; Pairing ideas with Burgundy</div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-combo="0">Romantic Classic</button>
    <button class="tab" data-combo="1">Dusty Elegance</button>
    <button class="tab" data-combo="2">Dark Luxe</button>
    <button class="tab" data-combo="3">Sage Romance</button>
  </div>

  <div id="combos"></div>
</div>

<script>
const combos = [
  {
    name:"Romantic Classic",
    desc:"Burgundy meets soft blush and ivory — the timeless pairing for an October celebration.",
    swatches:[
      {hex:"#722F37",name:"Burgundy",role:"Anchor"},
      {hex:"#F2D7D5",name:"Blush Rose",role:"Main accent"},
      {hex:"#FAF4EF",name:"Ivory Cream",role:"Base / linen"},
      {hex:"#C6A882",name:"Antique Gold",role:"Metallic detail"},
      {hex:"#6B4C3B",name:"Mocha",role:"Grounding neutral"},
    ],
    florals:["🌹","🌸","💐","🪴"],
    dressPalette:["#722F37","#F2D7D5","#FAF4EF","#C6A882"],
    dressLabels:["Tie / Sash","Bridesmaid","Bride","Trim"],
    ratio:[40,25,20,10,5],
    tip:"Pair ivory table linens with burgundy candles and blush floral centrepieces. Gold cutlery ties it all together beautifully."
  },
  {
    name:"Dusty Elegance",
    desc:"A softer, more muted interpretation — dusty rose and sage bring a dreamy, timeless feel.",
    swatches:[
      {hex:"#722F37",name:"Burgundy",role:"Anchor"},
      {hex:"#C4898B",name:"Dusty Rose",role:"Main accent"},
      {hex:"#8FAF8A",name:"Sage Green",role:"Fresh complement"},
      {hex:"#D6CBBF",name:"Warm Greige",role:"Base / linen"},
      {hex:"#B8A99A",name:"Taupe",role:"Grounding neutral"},
    ],
    florals:["🌷","🌿","🌾","🍃"],
    dressPalette:["#722F37","#C4898B","#8FAF8A","#D6CBBF"],
    dressLabels:["Tie / Sash","Bridesmaid","Greenery","Base"],
    ratio:[35,25,20,15,5],
    tip:"Use dried pampas grass, eucalyptus, and dusty rose peonies for a botanical, ethereal look. Greige linen napkins add texture."
  },
  {
    name:"Dark Luxe",
    desc:"For a dramatic, opulent atmosphere — deep navy and charcoal amplify the richness of burgundy.",
    swatches:[
      {hex:"#722F37",name:"Burgundy",role:"Anchor"},
      {hex:"#1C2B4A",name:"Deep Navy",role:"Bold contrast"},
      {hex:"#4A4A4A",name:"Charcoal",role:"Modern depth"},
      {hex:"#D4AF7A",name:"Champagne Gold",role:"Metallic glow"},
      {hex:"#F5F0EA",name:"Soft White",role:"Light relief"},
    ],
    florals:["🌹","🫐","🌑","✨"],
    dressPalette:["#722F37","#1C2B4A","#D4AF7A","#F5F0EA"],
    dressLabels:["Statement","Navy suit","Gold detail","White accent"],
    ratio:[35,30,20,10,5],
    tip:"Dark velvet tablecloths, candlelit gold centrepieces and deep floral arrangements of wine roses and dark dahlias create a sumptuous feel."
  },
  {
    name:"Sage Romance",
    desc:"Soft sage green and rich burgundy create a botanical, romantic autumn palette — muted yet deeply elegant.",
    swatches:[
      {hex:"#722F37",name:"Burgundy",role:"Anchor"},
      {hex:"#8FAF8A",name:"Sage Green",role:"Soft complement"},
      {hex:"#D4AF7A",name:"Champagne Gold",role:"Metallic warmth"},
      {hex:"#F5F0EA",name:"Soft Ivory",role:"Soft base"},
      {hex:"#3D2314",name:"Deep Espresso",role:"Dark grounding"},
    ],
    florals:["🌹","🌿","🍃","✨"],
    dressPalette:["#722F37","#8FAF8A","#D4AF7A","#F5F0EA"],
    dressLabels:["Burgundy dress","Sage suit","Gold detail","Ivory base"],
    ratio:[35,30,20,10,5],
    tip:"Pair sage eucalyptus foliage with rich burgundy roses and gold candlelight. Sage green velvet ribbons on ivory place settings create a soft, romantic atmosphere."
  }
];

function buildCombo(c,idx){
  const d=document.createElement('div');
  d.className='combo-wrap'+(idx===0?' visible':'');
  d.id='combo-'+idx;

  // Swatches
  let swHtml='<div class="palette-grid">';
  c.swatches.forEach(s=>{
    swHtml+=`<div class="swatch-card">
      <div class="swatch-top" style="background:${s.hex}"></div>
      <div class="swatch-info">
        <div class="swatch-name">${s.name}</div>
        <div class="swatch-hex">${s.hex}</div>
        <div class="role-tag">${s.role}</div>
      </div>
    </div>`;
  });
  swHtml+='</div>';

  // Ratio bar
  const ratioColors=c.swatches.map(s=>s.hex);
  const total=c.ratio.reduce((a,b)=>a+b,0);
  let ratioHtml='<div class="scene-label">Suggested proportion</div><div class="ratio-bar">';
  c.ratio.forEach((r,i)=>{
    const pct=(r/total*100).toFixed(0);
    const lum=parseInt(ratioColors[i].slice(1,3),16)*0.299+parseInt(ratioColors[i].slice(3,5),16)*0.587+parseInt(ratioColors[i].slice(5,7),16)*0.114;
    const txt=lum>140?'rgba(0,0,0,.55)':'rgba(255,255,255,.8)';
    ratioHtml+=`<div class="ratio-seg" style="flex:${r};background:${ratioColors[i]};color:${txt}">${pct>8?pct+'%':''}</div>`;
  });
  ratioHtml+='</div>';

  // Dress / attire preview
  let dressHtml='<div class="scene-label" style="margin-top:1.4rem">Attire palette</div><div class="dress-row">';
  c.dressPalette.forEach((col,i)=>{
    dressHtml+=`<div><div class="dress-swatch" style="background:${col}"><div class="dress-dot"></div></div><div class="dress-label">${c.dressLabels[i]}</div></div>`;
  });
  dressHtml+='</div>';

  // Table strip (texture preview)
  let stripHtml='<div class="scene-label" style="margin-top:1.4rem">Tablescape feel</div><div class="scene-card"><div class="scene-title">${c.name}</div>';
  const stripCols=[c.swatches[2].hex,c.swatches[0].hex,c.swatches[3].hex,c.swatches[1].hex,c.swatches[0].hex,c.swatches[4].hex];
  stripHtml=stripHtml.replace('${c.name}',c.name);
  for(let row=0;row<3;row++){
    stripHtml+='<div class="table-strip">';
    stripCols.forEach((col,ci)=>{
      stripHtml+=`<div class="strip-seg" style="background:${col};opacity:${row===1?1:.65}"></div>`;
    });
    stripHtml+='</div>';
  }

  // Florals
  stripHtml+='<div class="floral">';
  c.florals.forEach(f=>{
    stripHtml+=`<div class="petal" title="floral">${f}</div>`;
  });
  stripHtml+=`<span class="petal-label">— seasonal florals</span></div></div>`;

  d.innerHTML=`<p style="font-size:13px;color:var(--color-text-secondary);line-height:1.7;margin-bottom:1rem">${c.desc}</p>`+swHtml+ratioHtml+dressHtml+stripHtml+`<p class="tip">${c.tip}</p>`;
  return d;
}

const container=document.getElementById('combos');
combos.forEach((c,i)=>container.appendChild(buildCombo(c,i)));

document.getElementById('tabs').addEventListener('click',e=>{
  const btn=e.target.closest('.tab');
  if(!btn)return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.combo-wrap').forEach(t=>t.classList.remove('visible'));
  btn.classList.add('active');
  document.getElementById('combo-'+btn.dataset.combo).classList.add('visible');
});
</script>
